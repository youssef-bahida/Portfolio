<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --accent:   #e8ff47;
    --accent2:  #47ffe8;
    --red:      #ff4757;
    --text:     #e2e2f0;
    --muted:    #5a5a7a;
    --progress: #e8ff47;
    --mono:     'Space Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header {
    margin-bottom: 52px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 4px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .logo-icon svg { display: block; }

  h1 {
    font-family: var(--sans);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 58px;
  }

  /* ── Input card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .field-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  #urlInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  #urlInput:focus {
    border-color: var(--accent);
  }

  #urlInput::placeholder { color: var(--muted); }

  #urlInput.error { border-color: var(--red); }

  #downloadBtn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 12px 24px;
    cursor: pointer;
    letter-spacing: 0.04em;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  #downloadBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  #downloadBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 10px;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* ── Status bar ── */
  #statusBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  #statusBar.visible { display: flex; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .status-dot.done  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: none; }
  .status-dot.error { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #statusText { flex: 1; }
  #outputPath { color: var(--accent2); font-size: 0.68rem; word-break: break-all; }

  /* ── Overall progress bar ── */
  #overallWrap {
    display: none;
    margin-bottom: 28px;
  }

  #overallWrap.visible { display: block; }

  .section-title {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .overall-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  #overallBarFill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .overall-stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
  }

  #completedCount { color: var(--accent); }

  /* ── Video list ── */
  #videoSection { display: none; }
  #videoSection.visible { display: block; }

  #videoList {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .video-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    transition: border-color 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .video-item.active  { border-color: var(--accent); }
  .video-item.done    { border-color: #1e3e2e; }
  .video-item.errored { border-color: #3e1e1e; }

  .video-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .video-status-icon {
    font-size: 0.9rem;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  .video-name {
    font-size: 0.78rem;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .video-meta {
    font-size: 0.68rem;
    color: var(--muted);
    flex-shrink: 0;
    display: flex;
    gap: 12px;
  }

  .meta-speed { color: var(--accent2); }
  .meta-eta   { color: var(--muted); }

  .bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .video-item.done  .bar-fill { background: var(--accent2); width: 100%; }
  .video-item.errored .bar-fill { background: var(--red); }

  /* ── Done banner ── */
  #doneBanner {
    display: none;
    background: #0d2e1a;
    border: 1px solid #1a5c34;
    border-radius: 8px;
    padding: 20px 24px;
    margin-top: 20px;
    animation: slideIn 0.3s ease;
  }

  #doneBanner.visible { display: flex; align-items: center; gap: 16px; }

  .done-icon {
    font-size: 2rem;
    flex-shrink: 0;
  }

  .done-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .done-path {
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
  }

  /* ── Error banner ── */
  #errorBanner {
    display: none;
    background: #2e0d0d;
    border: 1px solid #5c1a1a;
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
    font-size: 0.78rem;
    color: var(--red);
  }
  #errorBanner.visible { display: block; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <polygon points="8,4 18,11 8,18" fill="#0a0a0f"/>
          <rect x="3" y="4" width="3" height="14" rx="1" fill="#0a0a0f"/>
        </svg>
      </div>
      <h1>YT Downloader</h1>
    </div>
    <p class="subtitle">Playlist → Desktop · MP4 · Best Quality</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <label class="field-label" for="urlInput">Playlist URL</label>
    <div class="input-row">
      <input
        id="urlInput"
        type="text"
        placeholder="https://youtube.com/playlist?list=..."
        autocomplete="off"
        spellcheck="false"
      >
      <button id="downloadBtn" onclick="startDownload()">▶ Download</button>
    </div>
    <p class="hint">Folder will be created on your Desktop as <code style="color:var(--accent)">playlist_[name]</code></p>
  </div>

  <!-- Status bar -->
  <div id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Initializing...</span>
    <span id="outputPath"></span>
  </div>

  <!-- Overall progress -->
  <div id="overallWrap">
    <div class="section-title">Overall Progress</div>
    <div class="overall-bar-bg">
      <div id="overallBarFill"></div>
    </div>
    <div class="overall-stats">
      <span><span id="completedCount">0</span> / <span id="totalCount">?</span> videos</span>
      <span id="overallPct">0%</span>
    </div>
  </div>

  <!-- Video list -->
  <div id="videoSection">
    <div class="section-title" style="margin-bottom:12px">Downloads</div>
    <div id="videoList"></div>
  </div>

  <!-- Done banner -->
  <div id="doneBanner">
    <div class="done-icon">✦</div>
    <div>
      <div class="done-title">All downloads complete</div>
      <div class="done-path" id="donePathText"></div>
    </div>
  </div>

  <!-- Error banner -->
  <div id="errorBanner" id="errorMsg"></div>

</div>

<script>
  let completed = 0;
  let total = 0;
  let currentItem = null;

  const $ = id => document.getElementById(id);

  function setStatus(text, state = 'active') {
    $('statusBar').className = 'visible';
    $('statusText').textContent = text;
    const dot = $('statusDot');
    dot.className = 'status-dot ' + state;
  }

  function getOrCreateItem(filename) {
    const existing = document.querySelector(`[data-file="${CSS.escape(filename)}"]`);
    if (existing) return existing;

    const el = document.createElement('div');
    el.className = 'video-item active';
    el.dataset.file = filename;
    el.innerHTML = `
      <div class="video-top">
        <span class="video-status-icon">⟳</span>
        <span class="video-name">${filename}</span>
        <span class="video-meta">
          <span class="meta-speed" data-speed></span>
          <span class="meta-eta" data-eta></span>
        </span>
      </div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    `;
    $('videoList').prepend(el);
    $('videoSection').className = 'visible';
    return el;
  }

  function startDownload() {
    const url = $('urlInput').value.trim();
    if (!url) {
      $('urlInput').classList.add('error');
      setTimeout(() => $('urlInput').classList.remove('error'), 1000);
      return;
    }

    // Reset UI
    $('videoList').innerHTML = '';
    $('doneBanner').className = '';
    $('errorBanner').className = '';
    $('videoSection').className = '';
    $('overallWrap').className = '';
    $('overallBarFill').style.width = '0%';
    $('downloadBtn').disabled = true;
    completed = 0;
    total = 0;
    setStatus('Fetching playlist info...');

    fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url })
    })
    .then(r => r.json())
    .then(({ session_id, error }) => {
      if (error) { showError(error); return; }
      listenStream(session_id);
    })
    .catch(e => showError(e.message));
  }

  function listenStream(sessionId) {
    const es = new EventSource(`/api/stream/${sessionId}`);

    es.onmessage = e => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'ping') return;

      if (msg.type === 'start') {
        total = msg.total;
        $('totalCount').textContent = total;
        $('completedCount').textContent = 0;
        $('overallWrap').className = 'visible';
        $('outputPath').textContent = msg.output_dir;
        setStatus(`Downloading "${msg.playlist_title}"`, 'active');
      }

      if (msg.type === 'progress') {
        const item = getOrCreateItem(msg.filename);
        const pct = parseFloat(msg.percent) || 0;
        item.querySelector('.bar-fill').style.width = pct + '%';
        item.querySelector('[data-speed]').textContent = msg.speed;
        item.querySelector('[data-eta]').textContent = 'ETA ' + msg.eta;
        item.querySelector('.video-status-icon').textContent = '↓';
      }

      if (msg.type === 'finished_file') {
        completed++;
        $('completedCount').textContent = completed;
        const pct = total ? Math.round(completed / total * 100) : 0;
        $('overallBarFill').style.width = pct + '%';
        $('overallPct').textContent = pct + '%';
        setStatus(`Downloaded ${completed}/${total} videos`, 'active');

        const item = getOrCreateItem(msg.filename);
        item.className = 'video-item done';
        item.querySelector('.video-status-icon').textContent = '✓';
        item.querySelector('[data-speed]').textContent = '';
        item.querySelector('[data-eta]').textContent = '';
      }

      if (msg.type === 'error_file') {
        const item = getOrCreateItem(msg.filename);
        item.className = 'video-item errored';
        item.querySelector('.video-status-icon').textContent = '✗';
      }

      if (msg.type === 'done') {
        es.close();
        $('downloadBtn').disabled = false;
        setStatus('All done!', 'done');
        $('overallBarFill').style.width = '100%';
        $('overallPct').textContent = '100%';
        $('doneBanner').className = 'visible';
        $('donePathText').textContent = '📁 ' + msg.output_dir;
      }

      if (msg.type === 'fatal') {
        es.close();
        $('downloadBtn').disabled = false;
        setStatus('Error', 'error');
        showError(msg.message);
      }
    };

    es.onerror = () => {
      es.close();
      $('downloadBtn').disabled = false;
      setStatus('Connection lost', 'error');
    };
  }

  function showError(msg) {
    const el = $('errorBanner');
    el.className = 'visible';
    el.textContent = '✗ ' + msg;
  }

  // Allow Enter key
  $('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });
</script>
</body>
</html>
